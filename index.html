<style>
  :root {
    --gold: #C8A96E;
    --gold-light: #E8D5A3;
    --dark: #0D0D0D;
    --dark2: #1A1A1A;
    --dark3: #242424;
    --dark4: #2E2E2E;
    --text: #F5F0E8;
    --text-muted: #A09080;
    --red: #E05A3A;
    --green: #4CAF50;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* HERO */
  .hero {
    background: linear-gradient(180deg, #0D0D0D 0%, #1a1208 50%, #0D0D0D 100%);
    padding: 48px 20px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(200,169,110,0.15) 0%, transparent 70%);
  }
  .hero-logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 3.2rem);
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  .hero-logo .icy { color: #7EC8E3; }
  .hero-logo .spicy { color: var(--red); }
  .hero-logo .rest { color: var(--text); }
  .hero-tagline { color: var(--gold); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
  .hero-divider { width: 60px; height: 1px; background: var(--gold); margin: 16px auto; opacity: 0.5; }
  .table-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(200,169,110,0.12); border: 1px solid rgba(200,169,110,0.3);
    padding: 6px 16px; border-radius: 20px; font-size: 13px; color: var(--gold-light);
    margin-top: 4px;
  }

  /* CATEGORY NAV */
  .cat-nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--dark2);
    border-bottom: 1px solid var(--dark4);
    padding: 0 16px;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-nav-inner { display: inline-flex; gap: 4px; padding: 10px 0; }
  .cat-btn {
    padding: 7px 14px; border-radius: 20px; border: 1px solid var(--dark4);
    background: transparent; color: var(--text-muted); font-size: 12px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .cat-btn.active { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 500; }

  /* MENU */
  .menu-wrap { padding: 16px 16px 120px; max-width: 600px; margin: 0 auto; }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px; color: var(--gold);
    padding: 24px 0 12px;
    border-bottom: 1px solid var(--dark4);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title span { font-size: 18px; }

  .item-card {
    background: var(--dark2);
    border: 1px solid var(--dark4);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.2s;
  }
  .item-card:hover { border-color: rgba(200,169,110,0.3); }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .item-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .item-price { font-size: 13px; color: var(--gold); font-weight: 500; white-space: nowrap; margin-top: 2px; }
  .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .veg-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--green); background: var(--green); flex-shrink: 0;
  }

  /* ADD BUTTON */
  .add-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--gold); background: transparent;
    color: var(--gold); font-size: 20px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .add-btn:hover { background: var(--gold); color: var(--dark); }
  .qty-ctrl { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--gold); background: transparent;
    color: var(--gold); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .qty-btn:hover { background: var(--gold); color: var(--dark); }
  .qty-num { font-size: 14px; font-weight: 500; min-width: 16px; text-align: center; color: var(--text); }

  /* HALF/FULL */
  .hf-row { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .hf-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 11px;
    border: 1px solid var(--dark4); background: transparent;
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .hf-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(200,169,110,0.1); }

  /* CART BAR */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--gold);
    padding: 14px 20px;
    display: none; align-items: center; justify-content: space-between;
    cursor: pointer;
    max-width: 600px; margin: 0 auto;
  }
  .cart-bar.show { display: flex; }
  .cart-bar-left { display: flex; align-items: center; gap: 10px; }
  .cart-count { background: var(--dark); color: var(--gold); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .cart-label { font-size: 14px; font-weight: 600; color: var(--dark); }
  .cart-total { font-size: 14px; font-weight: 700; color: var(--dark); }

  /* ORDER MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.85);
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--dark2);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 600px;
    max-height: 85vh; overflow-y: auto;
    padding: 0 0 24px;
  }
  .modal-handle { width: 40px; height: 4px; background: var(--dark4); border-radius: 2px; margin: 14px auto 20px; }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; color: var(--gold);
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--dark4);
  }
  .cart-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--dark4); }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: 500; }
  .cart-item-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .cart-item-price { font-size: 13px; color: var(--gold); font-weight: 600; white-space: nowrap; }

  .order-summary { padding: 16px 20px; }
  .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .summary-row.total { font-size: 16px; color: var(--text); font-weight: 600; border-top: 1px solid var(--dark4); padding-top: 12px; margin-top: 4px; }

  .table-input-wrap { padding: 0 20px 16px; }
  .table-input-wrap label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 6px; }
  .table-input {
    width: 100%; background: var(--dark3); border: 1px solid var(--dark4); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
  }
  .table-input:focus { outline: none; border-color: var(--gold); }

  .place-order-btn {
    margin: 0 20px; width: calc(100% - 40px);
    background: var(--gold); color: var(--dark);
    border: none; border-radius: 12px; padding: 16px;
    font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: opacity 0.2s;
  }
  .place-order-btn:hover { opacity: 0.9; }

  /* SUCCESS */
  .success-screen {
    position: fixed; inset: 0; z-index: 400;
    background: var(--dark);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center;
  }
  .success-screen.show { display: flex; }
  .success-icon { font-size: 64px; margin-bottom: 20px; }
  .success-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold); margin-bottom: 12px; }
  .success-sub { color: var(--text-muted); font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
  .success-order-id { background: var(--dark2); border: 1px solid var(--dark4); border-radius: 10px; padding: 12px 24px; font-size: 13px; color: var(--gold); margin-bottom: 32px; }
  .new-order-btn {
    background: transparent; border: 1.5px solid var(--gold); color: var(--gold);
    padding: 12px 32px; border-radius: 10px; font-size: 14px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
  }

  .spicy-icon { font-size: 11px; }
  .hidden { display: none; }
</style>
</head>

  </div>
</div>

<!-- Success Screen -->
<div class="success-screen" id="successScreen">

    { name: "Gobhi Paratha", price: 95 },
    { name: "Aloo Pyaj Paratha", price: 80 },
    { name: "Pyaj Paratha", price: 80 },
    { name: "Paneer Pakoda", price: 140 },
    { name: "Onion Pakoda", price: 120 },
    { name: "Veg Pakoda", price: 120 },
    { name: "Masala Dosa", price: 90 },
    { name: "Paneer Masala Dosa", price: 110 },
    { name: "Mysore Masala Dosa", price: 125 },
    { name: "Rawa Masala Dosa", price: 125 },
    { name: "Idli Sambhar", price: 50 },
    { name: "Onion Uttapam", price: 90 },
    { name: "Onion Tomato Uttapam", price: 90 },
    { name: "Mix Veg Uttapam", price: 110 },

  ]},
  { section: "🍦 Dessert & Ice Cream", id: "dessert", items: [

  { section: "🫓 Papad", id: "papad", items: [
    { name: "Masala Papad", price: 65 },
    { name: "Dry Papad", price: 30 },
    { name: "Fry Papad", price: 50 },
  ]},
];

let cart = {};

function getCartKey(sIdx, iIdx, variant) { return `${sIdx}-${iIdx}-${variant}`; }

function buildMenu() {
  const nav = document.getElementById('catNav');
  const wrap = document.getElementById('menuWrap');
  nav.innerHTML = ''; wrap.innerHTML = '';

  MENU.forEach((sec, sIdx) => {
    // Nav btn
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (sIdx === 0 ? ' active' : '');
    btn.textContent = sec.section.split(' ').slice(1).join(' ');
    btn.onclick = () => {
      document.getElementById('sec-' + sIdx).scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    nav.appendChild(btn);

    // Section
    const secEl = document.createElement('div');
    secEl.id = 'sec-' + sIdx;
    const title = document.createElement('div');
    title.className = 'section-title';
    title.innerHTML = `<span>${sec.section.split(' ')[0]}</span>${sec.section.split(' ').slice(1).join(' ')}`;
    secEl.appendChild(title);

    sec.items.forEach((item, iIdx) => {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.id = `card-${sIdx}-${iIdx}`;

      const hasHF = item.full !== undefined;
      const defaultVariant = hasHF ? 'half' : 'std';
      const displayPrice = hasHF ? item.price : item.price;

      card.innerHTML = `
        <div class="veg-dot"></div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
          ${hasHF
            ? `<div class="item-price" id="price-${sIdx}-${iIdx}">Half ₹${item.price} · Full ₹${item.full}</div>`
            : item.withCheese
            ? `<div class="item-price">₹${item.price} · With Cheese ₹${item.withCheese}</div>`
            : `<div class="item-price">₹${item.price}</div>`
          }
        </div>
        <div class="item-right">
          <div class="add-btn" id="addbtn-${sIdx}-${iIdx}" onclick="addItem(${sIdx},${iIdx})">+</div>
          <div class="qty-ctrl hidden" id="qty-${sIdx}-${iIdx}">
            <button class="qty-btn" onclick="changeQty(${sIdx},${iIdx},-1)">−</button>
            <span class="qty-num" id="qnum-${sIdx}-${iIdx}">1</span>
            <button class="qty-btn" onclick="changeQty(${sIdx},${iIdx},1)">+</button>
          </div>
        </div>
      `;
      secEl.appendChild(card);
    });
    wrap.appendChild(secEl);
  });

  // Intersection observer for nav highlight
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const idx = e.target.id.split('-')[1];
        document.querySelectorAll('.cat-btn').forEach((b,i) => b.classList.toggle('active', i == idx));
      }
    });
  }, { rootMargin: '-40% 0px -55% 0px' });

  MENU.forEach((_,i) => { const el = document.getElementById('sec-'+i); if(el) observer.observe(el); });
}

function getVariant(sIdx, iIdx) {
  const item = MENU[sIdx].items[iIdx];
  if (!item.full) return 'std';
  // Check if user selected
  const key = `sel-${sIdx}-${iIdx}`;
  return window[key] || 'half';
}

function addItem(sIdx, iIdx) {
  const item = MENU[sIdx].items[iIdx];
  const variant = getVariant(sIdx, iIdx);
  const key = getCartKey(sIdx, iIdx, variant);
  const price = variant === 'full' ? item.full : item.price;

  if (cart[key]) {
    cart[key].qty++;
  } else {
    cart[key] = { sIdx, iIdx, variant, qty: 1, price, name: item.name };
  }

  document.getElementById('addbtn-' + sIdx + '-' + iIdx).classList.add('hidden');
  document.getElementById('qty-' + sIdx + '-' + iIdx).classList.remove('hidden');
  document.getElementById('qnum-' + sIdx + '-' + iIdx).textContent = getTotalQtyForItem(sIdx, iIdx);
  updateCartBar();
}

function getTotalQtyForItem(sIdx, iIdx) {
  return Object.keys(cart).filter(k => k.startsWith(`${sIdx}-${iIdx}-`)).reduce((s, k) => s + cart[k].qty, 0);
}

function changeQty(sIdx, iIdx, delta) {
  const item = MENU[sIdx].items[iIdx];
  const variant = getVariant(sIdx, iIdx);
  const key = getCartKey(sIdx, iIdx, variant);

  if (!cart[key] && delta > 0) { addItem(sIdx, iIdx); return; }
  if (!cart[key]) return;

  cart[key].qty += delta;
  if (cart[key].qty <= 0) { delete cart[key]; }

  const total = getTotalQtyForItem(sIdx, iIdx);
  if (total <= 0) {
    document.getElementById('addbtn-' + sIdx + '-' + iIdx).classList.remove('hidden');
    document.getElementById('qty-' + sIdx + '-' + iIdx).classList.add('hidden');
  } else {
    document.getElementById('qnum-' + sIdx + '-' + iIdx).textContent = total;
  }
  updateCartBar();
}

function updateCartBar() {
  const totalQty = Object.values(cart).reduce((s, v) => s + v.qty, 0);
  const totalAmt = Object.values(cart).reduce((s, v) => s + v.qty * v.price, 0);
  const bar = document.getElementById('cartBar');
  document.getElementById('cartCount').textContent = totalQty;
  document.getElementById('cartBarTotal').textContent = '₹' + totalAmt;
  bar.classList.toggle('show', totalQty > 0);
}

function openCart() {
  const modal = document.getElementById('cartModal');
  modal.classList.add('show');
  renderCartModal();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('cartModal')) {
    document.getElementById('cartModal').classList.remove('show');
  }
}

function renderCartModal() {
  const items = document.getElementById('cartItems');
  const summary = document.getElementById('orderSummary');
  items.innerHTML = '';

  const entries = Object.values(cart);
  entries.forEach(v => {
    const row = document.createElement('div');
    row.className = 'cart-item';
    const sub = v.variant === 'half' ? 'Half' : v.variant === 'full' ? 'Full' : '';
    row.innerHTML = `
      <div class="cart-item-info">
        <div class="cart-item-name">${v.name}</div>
        <div class="cart-item-sub">${sub ? sub + ' · ' : ''}Qty: ${v.qty}</div>
      </div>
      <div class="cart-item-price">₹${v.qty * v.price}</div>
    `;
    items.appendChild(row);
  });

  const subtotal = entries.reduce((s, v) => s + v.qty * v.price, 0);
  summary.innerHTML = `
    <div class="summary-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
    <div class="summary-row"><span>GST (5%)</span><span>₹${Math.round(subtotal * 0.05)}</span></div>
    <div class="summary-row total"><span>Total</span><span>₹${Math.round(subtotal * 1.05)}</span></div>
  `;
}

function placeOrder() {
  const table = document.getElementById('tableInput').value.trim();
  const instr = document.getElementById('instrInput').value.trim();
  if (!table) { document.getElementById('tableInput').focus(); document.getElementById('tableInput').style.borderColor = '#e05a3a'; return; }

  const orderId = 'IS' + Date.now().toString().slice(-6);
  document.getElementById('cartModal').classList.remove('show');
  document.getElementById('successOrderId').innerHTML = `Order #${orderId} · ${table}${instr ? '<br><span style="font-size:12px;color:#A09080">Note: ' + instr + '</span>' : ''}`;
  document.getElementById('successScreen').classList.add('show');
}

function resetOrder() {
  cart = {};
  document.getElementById('successScreen').classList.remove('show');
  document.querySelectorAll('.add-btn').forEach(b => b.classList.remove('hidden'));
  document.querySelectorAll('.qty-ctrl').forEach(b => b.classList.add('hidden'));
  document.getElementById('cartBar').classList.remove('show');
  document.getElementById('tableInput').value = '';
  document.getElementById('instrInput').value = '';
}

buildMenu();
</script>
